<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dónde ver el Mundial 2026 EN VIVO | Horarios y Resultados</title>
    <meta name="description" content="La guía definitiva del Mundial. Horarios adaptados a tu país, canales, resultados en vivo y simulador de grupos.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 0; }
        .header { background: #004b87; color: white; padding: 20px; text-align: center; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 26px; }
        .header p { margin: 5px 0 0 0; color: #b3d4ff; font-size: 14px; }
        .btn-share { position: absolute; top: 20px; right: 20px; background: #25D366; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .ad-space { text-align: center; margin: 20px 0; padding: 10px; background-color: #e9ecef; border: 1px dashed #adb5bd; border-radius: 8px; }
        
        /* Contenedor del Widget Automático */
        .widget-container { background: white; padding: 0; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; overflow: hidden; border-top: 5px solid #e3000f; }
        .widget-header { padding: 15px 20px; background: #f8f9fa; border-bottom: 1px solid #eee; }
        .widget-header h3 { margin: 0; color: #1a1a1a; display: flex; align-items: center; gap: 10px; }
        .widget-frame { width: 100%; height: 500px; border: none; }

        .table-container { overflow-x: auto; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #333; text-transform: uppercase; font-size: 13px; }
        .time-badge { background-color: #e3000f; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>

    <header class="header">
        <button class="btn-share" onclick="compartirWeb()">📲 Compartir</button>
        <h1 id="dynamic-title">⚽ Mundial 2026 Hub</h1>
        <p id="loading">Sincronizando horarios con tu zona local...</p>
    </header>

    <div class="container">
        <div class="ad-space"><script>(function(s){s.dataset.zone='11148195',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script></div>

        <div class="widget-container">
            <div class="widget-header">
                <h3>🔴 Resultados y Posiciones en Vivo</h3>
            </div>
            <iframe class="widget-frame" src="https://www.scorebat.com/embed/livescore/" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>
        </div>

        <h2 style="color: #004b87;">📅 Guía de Transmisión por País</h2>
        <div class="table-container">
            <table>
                <thead><tr><th>Fecha</th><th>Partido</th><th>Tu Hora Local</th><th>Transmisión Global</th></tr></thead>
                <tbody id="match-data"></tbody>
            </table>
        </div>

        <div class="ad-space"><script>(function(s){s.dataset.zone='11148195',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script></div>

        <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            <h2 style="text-align: center; color: #004b87;">🧮 Simulador de Clasificación</h2>
            <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">
                <div style="flex: 1; min-width: 250px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
                        <span style="font-weight: bold; width: 30%;">Local</span>
                        <input type="number" id="goles-local" value="0" min="0" style="width: 45px; text-align: center; font-size: 16px; border: 1px solid #ccc; border-radius: 4px;">
                        <span style="font-weight: bold; color: #666;">vs</span>
                        <input type="number" id="goles-visitante" value="0" min="0" style="width: 45px; text-align: center; font-size: 16px; border: 1px solid #ccc; border-radius: 4px;">
                        <span style="font-weight: bold; width: 30%; text-align: right;">Visita</span>
                    </div>
                    <button onclick="simularResultado()" style="width: 100%; padding: 12px; background: #e3000f; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Simular Tabla 📊</button>
                </div>
                <div style="flex: 1; min-width: 250px;">
                    <table style="width: 100%; text-align: center; font-size: 14px;">
                        <tr style="background: #004b87; color: white;"><th>Equipo</th><th>Pts</th><th>GF</th><th>GC</th></tr>
                        <tbody id="tabla-simulada">
                            <tr><td><strong>Local</strong></td><td id="pts-local">0</td><td id="gf-local">0</td><td id="gc-local">0</td></tr>
                            <tr><td>Visita</td><td id="pts-visitante">0</td><td id="gf-visitante">0</td><td id="gc-visitante">0</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function compartirWeb() {
            if (navigator.share) {
                navigator.share({ title: 'Mundial 2026 EN VIVO', text: 'Mirá los horarios exactos de tu país y los resultados en vivo acá:', url: window.location.href }).catch(console.error);
            }
        }

        const matches = [
            { date: '2026-06-14T16:00:00-04:00', teams: 'Países Bajos vs. Japón', channels: 'DSports / FIFA+' },
            { date: '2026-06-14T19:00:00-04:00', teams: 'Costa de Marfil vs. Ecuador', channels: 'DSports / FIFA+' },
            { date: '2026-06-15T12:00:00-04:00', teams: 'España vs. Cabo Verde', channels: 'DSports / FIFA+' },
            { date: '2026-06-15T18:00:00-04:00', teams: 'Arabia Saudita vs. Uruguay', channels: 'DSports / FIFA+' }
        ];

        async function initGlobalSite() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const country = data.country_name || 'tu país';
                
                document.getElementById('dynamic-title').innerText = `⚽ Dónde ver el Mundial en ${country}`;
                document.title = `Dónde ver el Mundial en ${country} | En Vivo`;
                document.getElementById('loading').style.display = 'none';

                const tbody = document.getElementById('match-data');
                matches.forEach(match => {
                    const matchDate = new Date(match.date);
                    const localTime = new Intl.DateTimeFormat('es-ES', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' }).format(matchDate);
                    const localDate = new Intl.DateTimeFormat('es-ES', { day: 'numeric', month: 'long' }).format(matchDate);
                    tbody.innerHTML += `<tr><td>${localDate}</td><td><strong>${match.teams}</strong></td><td><span class="time-badge">${localTime}</span></td><td>${match.channels}</td></tr>`;
                });
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function simularResultado() {
            let gL = parseInt(document.getElementById('goles-local').value) || 0;
            let gV = parseInt(document.getElementById('goles-visitante').value) || 0;
            let pL = 0, pV = 0;
            if (gL > gV) { pL = 3; } else if (gL < gV) { pV = 3; } else { pL = 1; pV = 1; }
            document.getElementById('pts-local').innerText = pL;
            document.getElementById('gf-local').innerText = gL;
            document.getElementById('gc-local').innerText = gV;
            document.getElementById('pts-visitante').innerText = pV;
            document.getElementById('gf-visitante').innerText = gV;
            document.getElementById('gc-visitante').innerText = gL;
        }

        window.onload = initGlobalSite;
    </script>
</body>
</html>
