<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título SEO Global -->
    <title>Dónde ver el Mundial 2026 EN VIVO | Horarios y Canales por País</title>
    <meta name="description" content="Guía dinámica con horarios adaptados a tu zona horaria y los canales oficiales para ver los partidos del Mundial 2026 en vivo.">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1a1a1a; font-size: 24px; transition: color 0.3s; }
        .table-container { overflow-x: auto; margin-top: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background-color: #fff; min-width: 500px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #004b87; color: white; text-transform: uppercase; font-size: 14px; }
        tr:hover { background-color: #f1f1f1; }
        .time-badge { background-color: #e3000f; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .ad-space { text-align: center; margin: 20px 0; padding: 15px; background-color: #e9ecef; border: 1px dashed #adb5bd; color: #6c757d; }
        #loading { text-align: center; font-style: italic; color: #666; }
    </style>
</head>
<body>

    <!-- El título cambiará automáticamente según el país -->
    <h1 id="dynamic-title">⚽ Guía de Transmisión: Mundial 2026</h1>
    <p id="loading">Adaptando los horarios a tu zona local...</p>

    <div class="ad-space"><script>(function(s){s.dataset.zone='11148195',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script></div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Partido (Fase de Grupos)</th>
                    <th>Tu Hora Local</th>
                    <th>Transmisión Global</th>
                </tr>
            </thead>
            <tbody id="match-data">
                <!-- JavaScript inyectará los partidos aquí -->
            </tbody>
        </table>
    </div>

    <div class="ad-space"><script>(function(s){s.dataset.zone='11148195',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script></div>

    <script>
        // Datos reales del Mundial: 14 y 15 de Junio 2026 (Horarios en formato UTC-4 / ET)
        const matches = [
            { date: '2026-06-14T13:00:00-04:00', teams: 'Alemania vs. Curaçao', channels: 'DSports / FIFA+' },
            { date: '2026-06-14T16:00:00-04:00', teams: 'Países Bajos vs. Japón', channels: 'DSports / FIFA+' },
            { date: '2026-06-14T19:00:00-04:00', teams: 'Costa de Marfil vs. Ecuador', channels: 'DSports / FIFA+' },
            { date: '2026-06-14T22:00:00-04:00', teams: 'Suecia vs. Túnez', channels: 'DSports / FIFA+' },
            { date: '2026-06-15T12:00:00-04:00', teams: 'España vs. Cabo Verde', channels: 'DSports / FIFA+' },
            { date: '2026-06-15T15:00:00-04:00', teams: 'Bélgica vs. Egipto', channels: 'DSports / FIFA+' },
            { date: '2026-06-15T18:00:00-04:00', teams: 'Arabia Saudita vs. Uruguay', channels: 'DSports / FIFA+' },
            { date: '2026-06-15T21:00:00-04:00', teams: 'Irán vs. Nueva Zelanda', channels: 'DSports / FIFA+' }
        ];

        async function initGlobalSite() {
            try {
                // 1. Detectar país del usuario (API Gratuita)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const country = data.country_name || 'tu país';
                
                // 2. Personalizar la web
                document.getElementById('dynamic-title').innerText = `⚽ Dónde ver el Mundial 2026 en ${country}`;
                document.title = `Dónde ver el Mundial 2026 en ${country} | Horarios`;
                document.getElementById('loading').style.display = 'none';

                // 3. Renderizar tabla con la hora exacta del celular del usuario
                const tbody = document.getElementById('match-data');
                matches.forEach(match => {
                    const matchDate = new Date(match.date);
                    
                    // Magia de JS: Convierte la hora automáticamente
                    const localTime = new Intl.DateTimeFormat('es-ES', { 
                        hour: '2-digit', minute: '2-digit', timeZoneName: 'short' 
                    }).format(matchDate);
                    
                    const localDate = new Intl.DateTimeFormat('es-ES', { 
                        day: 'numeric', month: 'long' 
                    }).format(matchDate);

                    const row = `<tr>
                        <td>${localDate}</td>
                        <td><strong>${match.teams}</strong></td>
                        <td><span class="time-badge">${localTime}</span></td>
                        <td>${match.channels}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error al cargar datos globales", error);
                document.getElementById('loading').innerText = "Error cargando la zona horaria.";
            }
        }

        // Arrancar la magia al abrir la página
        window.onload = initGlobalSite;
    </script>
</body>
</html>
