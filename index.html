<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 EN VIVO | Hub Global</title>
    <meta name="description" content="Toda la info del Mundial. Busca tu selección y entérate de todo.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>">
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 0; }
        .header { background: #004b87; color: white; padding: 20px; text-align: center; position: relative; }
        .header h1 { margin: 0; font-size: 26px; }
        .btn-share { position: absolute; top: 20px; right: 20px; background: #25D366; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .search-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .search-box input { width: 80%; max-width: 400px; padding: 12px; border: 2px solid #ddd; border-radius: 25px; font-size: 16px; outline: none; }
        
        /* Dashboard Nivel Silicon Valley */
        #dashboard-pais { display: none; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid #e3000f; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .card h4 { margin-top: 0; color: #004b87; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        
        .ad-space { text-align: center; margin: 20px 0; padding: 10px; background-color: #e9ecef; border: 1px dashed #adb5bd; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        th { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <header class="header">
        <button class="btn-share" onclick="compartirWeb()">📲 Compartir</button>
        <h1 id="dynamic-title">⚽ Mundial 2026 Hub</h1>
    </header>

    <div class="container">
        <div class="ad-space"><script>(function(s){s.dataset.zone='11148195',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script></div>

        <div class="search-box">
            <h3>🔍 Buscador Inteligente</h3>
            <input type="text" id="searchInput" placeholder="Ej: Paraguay, Argentina, Brasil..." onkeyup="buscarPais()">
        </div>

        <!-- DASHBOARD DINÁMICO DEL PAÍS -->
        <div id="dashboard-pais">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="db-nombre" style="margin: 0; color: #1a1a1a; font-size: 28px;">País</h2>
                <span id="db-grupo" style="background: #004b87; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold;">Grupo X</span>
            </div>
            
            <div class="dashboard-grid">
                <!-- Tarjeta: Último Partido -->
                <div class="card" style="border-left: 4px solid #28a745;">
                    <h4>🔙 Partido Reciente</h4>
                    <p id="db-reciente" style="font-size: 18px; font-weight: bold; margin: 10px 0;">Cargando...</p>
                    <p id="db-historial" style="font-size: 13px; color: #666; margin: 0;">Cargando historial...</p>
                </div>

                <!-- Tarjeta: Próximo Partido -->
                <div class="card" style="border-left: 4px solid #e3000f;">
                    <h4>🔜 Próximo Desafío</h4>
                    <p id="db-proximo" style="font-weight: bold; margin: 10px 0;">Cargando...</p>
                    <p id="db-tv" style="font-size: 13px; color: #e3000f; margin: 0;">📺 Transmisión: Cargando...</p>
                </div>

                <!-- Tarjeta: Estado del Plantel -->
                <div class="card" style="border-left: 4px solid #ffc107;">
                    <h4>🚑 Estado del Plantel</h4>
                    <p id="db-novedades" style="font-size: 14px; margin: 10px 0;">Cargando...</p>
                </div>

                <!-- Tarjeta: Tabla del Grupo -->
                <div class="card" style="grid-column: 1 / -1;">
                    <h4>📊 Posiciones del Grupo</h4>
                    <table>
                        <thead><tr><th>Selección</th><th>Pts</th><th>PJ</th><th>DIF</th></tr></thead>
                        <tbody id="db-tabla-grupo">
                            <!-- Se llena con JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="ad-space"><script>(function(s){s.dataset.zone='11148195',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script></div>
    </div>

    <script>
        // COMPARTIR NATIVO
        function compartirWeb() {
            if (navigator.share) {
                navigator.share({ title: 'Mundial 2026', text: 'Toda la info y horarios del mundial aquí:', url: window.location.href }).catch(console.error);
            }
        }

        // BASE DE DATOS ESTRUCTURADA (Simulando respuesta de API)
        const apiData = {
            "paraguay": {
                grupo: "Grupo D",
                reciente: "Paraguay 2 - 1 EEUU",
                historial: "Goles: Almirón (34'), Enciso (78') | Pulisic (12'). Posesión: 45% - 55%.",
                proximo: "Paraguay vs. Japón | 18 Jun - 16:00 hs",
                tv: "Telefuturo, SNT, Tigo Sports",
                novedades: "🟨 Gómez (Apercibido). ✅ Resto del plantel al 100%.",
                tabla: [
                    { equipo: "Paraguay", pts: 3, pj: 1, dif: "+1" },
                    { equipo: "Japón", pts: 1, pj: 1, dif: "0" },
                    { equipo: "Senegal", pts: 1, pj: 1, dif: "0" },
                    { equipo: "EEUU", pts: 0, pj: 1, dif: "-1" }
                ]
            },
            "argentina": {
                grupo: "Grupo A",
                reciente: "Argentina 3 - 0 Canadá",
                historial: "Goles: Messi (2), Álvarez (1). Dominio total del medio campo.",
                proximo: "Argentina vs. Marruecos | 17 Jun - 18:00 hs",
                tv: "TyC Sports, TV Pública",
                novedades: "✅ Sin lesionados ni suspendidos.",
                tabla: [
                    { equipo: "Argentina", pts: 3, pj: 1, dif: "+3" },
                    { equipo: "Marruecos", pts: 1, pj: 1, dif: "0" },
                    { equipo: "Rumania", pts: 1, pj: 1, dif: "0" },
                    { equipo: "Canadá", pts: 0, pj: 1, dif: "-3" }
                ]
            }
        };

        // MOTOR DE BÚSQUEDA Y RENDERIZADO
        function buscarPais() {
            let input = document.getElementById('searchInput').value.toLowerCase().trim();
            let dashboard = document.getElementById('dashboard-pais');
            
            // Quitar tildes para la búsqueda
            let paisId = input.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            if(paisId.length >= 3 && apiData[paisId]) {
                let data = apiData[paisId];
                dashboard.style.display = 'block';
                
                // Inyectar datos
                document.getElementById('db-nombre').innerText = input.charAt(0).toUpperCase() + input.slice(1);
                document.getElementById('db-grupo').innerText = data.grupo;
                document.getElementById('db-reciente').innerText = data.reciente;
                document.getElementById('db-historial').innerText = data.historial;
                document.getElementById('db-proximo').innerText = data.proximo;
                document.getElementById('db-tv').innerText = "📺 Transmisión local: " + data.tv;
                document.getElementById('db-novedades').innerText = data.novedades;
                
                // Renderizar tabla
                let tbody = document.getElementById('db-tabla-grupo');
                tbody.innerHTML = "";
                data.tabla.forEach(fila => {
                    let style = fila.equipo.toLowerCase() === paisId ? "background-color: #e8f5e9; font-weight:bold;" : "";
                    tbody.innerHTML += `<tr style="${style}"><td>${fila.equipo}</td><td>${fila.pts}</td><td>${fila.pj}</td><td>${fila.dif}</td></tr>`;
                });
            } else {
                dashboard.style.display = 'none';
            }
        }
    </script>
</body>
</html>
